<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGrocs - Welcome</title>
    <link rel="icon" type="image/x-icon" href="images/CGrocs.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <!-- Vercel Analytics -->
    <script>
     window.va = window.va || function () {
        (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <!-- Vercel Speed Insights -->
    <script>
     window.si = window.si || function () {
        (window.siq = window.siq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
    <nav class="home-nav">
        <div class="navlogo"><img src="images/CGrocs.png" alt="CGrocs" width="44px"></div>
        <div style="display:flex;align-items:center;gap:10px;">
            <button onclick="showStorePicker()" class="switch-store-btn" id="switch-store-btn">Switch Store</button>
            <button onclick="window.location.href='login.html'" class="login-button">Login</button>
        </div>
    </nav>

    <!-- Store Picker Modal — cards populated dynamically from Firestore storeConfig -->
    <div class="store-picker-overlay" id="store-picker" style="display:none">
        <div class="store-picker-box">
            <div class="sp-header">
                <img src="images/CGrocs.png" alt="CGrocs">
                <h1>Switch Store</h1>
                <p>Choose which store to browse</p>
            </div>
            <div class="sp-body">
                <span class="sp-label">Select your store</span>
                <div class="store-cards" id="store-cards-container">
                    <!-- Populated by loadStoreCards() below -->
                    <p style="color:var(--muted);font-size:13px;text-align:center;grid-column:1/-1;">Loading stores…</p>
                </div>
            </div>
        </div>
    </div>

    <div id="product-container-home" class="product-grid"></div>

    <!-- Switch Store button style -->
    <style>
        .switch-store-btn {
            padding: 8px 18px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.20);
            color: rgba(255,255,255,0.90);
            border-radius: 20px; font-size: 14px; font-weight: 600;
            cursor: pointer; font-family: var(--font);
            transition: background 0.2s, color 0.2s;
        }
        .switch-store-btn:hover { background: rgba(255,255,255,0.22); color: white; }
    </style>

    <script src="notifications.js"></script>
    <script src="cardstorage.js" type="module"></script>

    <script type="module">
        import { initializeApp, getApps }         from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged }     from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc }       from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";
        import { customerConfig, headAdminConfig, STORE_IDS, STORE_LABELS } from "./firebase-config.js";

        // Redirect logged-in customers straight to the shop
        const custApp  = getApps().find(a => a.name === 'cardstorage') || initializeApp(customerConfig, 'cardstorage');
        const custAuth = getAuth(custApp);
        onAuthStateChanged(custAuth, user => { if (user) window.location.href = 'customer.html'; });

        // Load store list from Firestore; fall back to firebase-config.js defaults
        async function loadStoreCards() {
            let stores = STORE_IDS.map(id => ({ id, label: STORE_LABELS[id] || id }));
            try {
                const haApp = getApps().find(a => a.name === 'home-ha') || initializeApp(headAdminConfig, 'home-ha');
                const haDb  = getFirestore(haApp);
                const snap  = await getDoc(doc(haDb, 'storeConfig', 'list'));
                if (snap.exists() && Array.isArray(snap.data().stores) && snap.data().stores.length > 0) {
                    stores = snap.data().stores;
                }
            } catch(e) { /* rules may block unauthenticated reads — fallback is fine */ }

            window._storeLabels = Object.fromEntries(stores.map(s => [s.id, s.label]));

            const container = document.getElementById('store-cards-container');
            if (!container) return;
            container.innerHTML = stores.map(s => `
                <button class="store-card" onclick="pickStore('${s.id}')">
                    <div class="store-name">${s.label}</div>
                </button>`).join('');
        }

        loadStoreCards();

        window.showStorePicker = function() {
            document.getElementById('store-picker').style.display = 'flex';
        };

        // pickStore: switch which store is previewed on home page (no login redirect)
        window.pickStore = function(storeId) {
            sessionStorage.setItem('selectedStore', storeId);
            if (window._storeLabels && window._storeLabels[storeId]) {
                sessionStorage.setItem('storeLabel_' + storeId, window._storeLabels[storeId]);
            }
            document.getElementById('store-picker').style.display = 'none';
            // Reload products for the chosen store
            if (typeof window.reloadStoreProducts === 'function') window.reloadStoreProducts();
        };

        document.addEventListener('DOMContentLoaded', async function() {
            if (!sessionStorage.getItem('selectedStore')) {
                sessionStorage.setItem('selectedStore', 'store1');
            }
            await loadStoreCards();
            if (typeof window.reloadStoreProducts === 'function') window.reloadStoreProducts();
        });

        // Allow closing the picker by clicking the backdrop (only if a store is already selected)
        document.getElementById('store-picker').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
    </script>
