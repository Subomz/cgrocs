<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColEx - Welcome</title>
    <link rel="icon" type="image/x-icon" href="images/CloEx.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <nav class="d-flex justify-content-between px-5 py-3 align-items-center shadow">
        <div class="navlogo">
            <img src="images/CloEx.png" alt="company logo" width="60px">
        </div>
        <button onclick="window.location.href='login.html'" class="login-button">Login</button>
    </nav>

    <!-- Product Grid -->
    <div id="product-container-home" class="product-grid">
        <!-- Products will be injected here by JavaScript -->
    </div>

    <script src="notifications.js"></script>
    <script src="cardstorage.js" type="module"></script>

    <!-- Fix #6: redirect already-authenticated users straight to the shop.
         Reuses the named 'cardstorage' app if cardstorage.js already created it,
         otherwise creates it here. Either way no duplicate initialisation occurs. -->
    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
        import { customerConfig } from "./firebase-config.js";

        const APP_NAME = 'cardstorage';
        let app;
        try {
            const existing = getApps().find(a => a.name === APP_NAME);
            app = existing ? existing : initializeApp(customerConfig, APP_NAME);
        } catch(e) { console.error('home.html auth check error:', e); }

        const auth = getAuth(app);
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'customer.html';
        });
    </script>
</body>
</html>
