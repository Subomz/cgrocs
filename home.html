<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColEx - Welcome</title>
    <link rel="icon" type="image/x-icon" href="images/CloEx.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <style>
        .store-picker-overlay {
            position:fixed;inset:0;background:rgba(10,10,10,0.82);
            backdrop-filter:blur(6px);display:flex;align-items:center;
            justify-content:center;z-index:99999;padding:20px;
        }
        .store-picker-box {
            background:white;border-radius:20px;max-width:520px;width:100%;
            box-shadow:0 24px 80px rgba(0,0,0,0.35);overflow:hidden;
            animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes popIn {
            from{opacity:0;transform:scale(.88) translateY(24px)}
            to{opacity:1;transform:scale(1) translateY(0)}
        }
        .sp-header{background:#0a0a0a;color:white;padding:32px 32px 28px;text-align:center}
        .sp-header img{width:52px;margin:0 auto 14px;display:block}
        .sp-header h1{font-size:22px;font-weight:800;margin:0 0 6px}
        .sp-header p{font-size:14px;color:rgba(255,255,255,.6);margin:0}
        .sp-body{padding:28px 28px 32px}
        .sp-label{font-size:11px;font-weight:700;text-transform:uppercase;
            letter-spacing:.07em;color:#6b7280;margin-bottom:14px;text-align:center;display:block}
        .store-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .store-card{border:2px solid #e4e4e7;border-radius:14px;padding:22px 16px;
            text-align:center;cursor:pointer;transition:all .2s;background:white;
            font-family:inherit;width:100%}
        .store-card:hover,.store-card:focus{border-color:#0a0a0a;
            box-shadow:0 4px 18px rgba(0,0,0,.12);transform:translateY(-2px);outline:none}
        
        .store-card .store-name{font-size:16px;font-weight:800;color:#111;margin-bottom:4px}
        .store-card .store-desc{font-size:12px;color:#6b7280;line-height:1.4}
        @media(max-width:420px){
            .sp-header{padding:24px 20px 20px}
            .sp-body{padding:20px 16px 24px}
            .store-cards{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
    <nav class="home-nav">
        <div class="navlogo"><img src="images/CloEx.png" alt="ColEx" width="44px"></div>
        <button onclick="showStorePicker()" class="login-button">Login</button>
    </nav>

    <!-- Store Picker Modal -->
    <div class="store-picker-overlay" id="store-picker" style="display:none">
        <div class="store-picker-box">
            <div class="sp-header">
                <img src="images/CloEx.png" alt="ColEx">
                <h1>Welcome to ColEx</h1>
                <p>Choose a store to continue</p>
            </div>
            <div class="sp-body">
                <span class="sp-label">Select your store</span>
                <div class="store-cards">
                    <button class="store-card" onclick="pickStore('store1')">
                        <div class="store-name">Store 1</div>
                        <div class="store-desc">ColEx Main Branch</div>
                    </button>
                    <button class="store-card" onclick="pickStore('store2')">
                        <div class="store-name">Store 2</div>
                        <div class="store-desc">ColEx Second Branch</div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="store-preview-notice" style="display:none;text-align:center;padding:32px 20px 0">
        <p style="color:#6b7280;font-size:14px">
            Browsing <strong id="preview-store-name">—</strong> &nbsp;&middot;&nbsp;
            <a href="#" onclick="showStorePicker();return false"
               style="color:#0a0a0a;font-weight:700;text-decoration:underline">Switch store</a>
        </p>
    </div>
    <div id="product-container-home" class="product-grid"></div>

    <script src="notifications.js"></script>
    <script src="cardstorage.js" type="module"></script>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
        import { customerConfig } from "./firebase-config.js";
        const APP_NAME = 'cardstorage';
        let app;
        try {
            const ex = getApps().find(a => a.name === APP_NAME);
            app = ex || initializeApp(customerConfig, APP_NAME);
        } catch(e) { console.error('home auth check:', e); }
        const auth = getAuth(app);
        onAuthStateChanged(auth, user => { if (user) window.location.href = 'customer.html'; });
    </script>

    <script>
        window.showStorePicker = function() {
            document.getElementById('store-picker').style.display = 'flex';
        };
        window.pickStore = function(storeId) {
            sessionStorage.setItem('selectedStore', storeId);
            document.getElementById('store-picker').style.display = 'none';
            const label = storeId === 'store1' ? 'Store 1 — Main Branch' : 'Store 2 — Second Branch';
            const notice = document.getElementById('store-preview-notice');
            const nameEl = document.getElementById('preview-store-name');
            if (notice) notice.style.display = 'block';
            if (nameEl)  nameEl.textContent   = label;
            // Redirect to login so they can sign in for this store
            window.location.href = 'login.html';
        };
        document.addEventListener('DOMContentLoaded', function() {
            const stored = sessionStorage.getItem('selectedStore');
            if (!stored) {
                showStorePicker();
                // No store yet — keep product grid empty
            } else {
                const label = stored === 'store1' ? 'Store 1 — Main Branch' : 'Store 2 — Second Branch';
                const notice = document.getElementById('store-preview-notice');
                const nameEl = document.getElementById('preview-store-name');
                if (notice) notice.style.display = 'block';
                if (nameEl)  nameEl.textContent   = label;
                // Store already chosen — load its products for the preview grid
                if (typeof window.reloadStoreProducts === 'function') {
                    window.reloadStoreProducts();
                }
            }
        });
        document.getElementById('store-picker').addEventListener('click', function(e) {
            if (e.target === this && sessionStorage.getItem('selectedStore')) {
                this.style.display = 'none';
            }
        });
    </script>
</body>
</html>
