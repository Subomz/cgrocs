<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGrocs - My Profile</title>
    <link rel="icon" type="image/x-icon" href="images/CGrocs.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="wallet.css">

    <!-- Paystack (required for wallet top-up) -->
    <script src="https://js.paystack.co/v1/inline.js"></script>

    <!-- Auth guard: redirect if not logged in -->
    <script src="customer-auth-guard.js" type="module"></script>
</head>
<body style="visibility:hidden;">

    <nav class="profile-nav">
        <div class="navlogo" onclick="window.location.href='customer.html'" style="cursor:pointer;">
            <img src="images/CGrocs.png" alt="CGrocs Logo" width="44px">
        </div>
        <div class="nav-actions">
            <button class="btn-back" onclick="window.location.href='customer.html'">Back to Shop</button>
            <button class="logout-button" type="button">Logout</button>
        </div>
    </nav>

    <main class="profile-main">

        <!-- LEFT: Avatar + quick info -->
        <aside class="profile-sidebar">
            <div class="avatar-wrap">
                <img id="avatar-display"
                     class="avatar-img"
                     src="https://ui-avatars.com/api/?name=You&background=0a0a0a&color=fff&size=120"
                     alt="Profile Photo">
                <button class="avatar-edit-btn" onclick="document.getElementById('avatar-input').click()" title="Change photo">&#9998;</button>
                <input type="file" id="avatar-input" accept="image/*" style="display:none;">
            </div>

            <h2 id="sidebar-name" class="sidebar-name">Loading...</h2>
            <p id="sidebar-email" class="sidebar-email">—</p>

            <div class="sidebar-badges">
                <span class="badge-item" id="badge-address">No address</span>
                <span class="badge-item" id="badge-phone">No phone</span>
            </div>

            <button class="btn-save-all" onclick="saveProfile()">Save Changes</button>
            <button class="btn-logout-side logout-button" type="button">Logout</button>
        </aside>

        <!-- RIGHT: Edit form + wallet + history -->
        <section class="profile-form-section">

            <!-- Personal Information -->
            <div class="form-card">
                <h3 class="form-card-title">Personal Information</h3>

                <div class="field-row">
                    <div class="form-field">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" placeholder="Jane">
                    </div>
                    <div class="form-field">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" placeholder="Doe">
                    </div>
                </div>

                <div class="form-field">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="+234 800 000 0000">
                </div>

                <div class="form-field">
                    <label for="email-display">Email Address <span class="label-note">(cannot be changed)</span></label>
                    <input type="email" id="email-display" disabled>
                </div>
            </div>

            <!-- ── WALLET CARD ── -->
            <div class="wallet-card">
                <div class="wallet-card-label">My Wallet</div>
                <div class="wallet-card-balance" id="wallet-balance-display" data-wallet-balance>₦0.00</div>
                <div class="wallet-card-actions">
                    <button class="wallet-btn-topup" onclick="window.openWalletTopup()">
                        + Top Up
                    </button>
                </div>
            </div>

            <!-- ── WALLET TRANSACTION HISTORY ── -->
            <div class="form-card">
                <h3 class="form-card-title">Wallet History</h3>
                <div class="wallet-tx-list" id="wallet-tx-list">
                    <p class="wallet-empty">Loading transactions…</p>
                </div>
            </div>

            <!-- Purchase History -->
            <div class="form-card">
                <h3 class="form-card-title">Recent Purchases</h3>
                <div id="purchase-list">
                    <p class="empty-state">Loading purchase history...</p>
                </div>
            </div>

        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="notifications.js"></script>
    <script src="avatar-upload.js"></script>
    <script>
        // Wire up avatar file input once DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initAvatarUpload === 'function') {
                initAvatarUpload('avatar-input', 'avatar-display');
            }
        });
    </script>
    <script type="module" src="profile.js"></script>
</body>
</html>
