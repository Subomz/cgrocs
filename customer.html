<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGrocs - Shop</title>
    <link rel="icon" type="image/x-icon" href="images/CGrocs.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="customer.css">

    <!-- Paystack -->
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script>
      /* Keep --nav-h in sync so the cart sidebar always starts below the navbar */
      function setNavH() {
        const nav = document.querySelector('nav');
        if (nav) document.documentElement.style.setProperty('--nav-h', nav.offsetHeight + 'px');
      }
      window.addEventListener('load',   setNavH);
      window.addEventListener('resize', setNavH);
      document.addEventListener('DOMContentLoaded', setNavH);
    </script>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- AUTHENTICATION GUARD — must load first -->
    <script src="customer-auth-guard.js" type="module"></script>
</head>
<body style="visibility: hidden;">

    <nav class="customer-nav">
        <div class="navlogo">
            <img src="images/CGrocs.png" alt="CGrocs" width="40px">
            <span id="customer-store-label" style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.7);margin-left:8px;"></span>
        </div>

        <div id="nav-search-wrap">
            <span id="nav-search-icon">&#9906;</span>
            <input type="text" id="product-search" placeholder="Search products..." oninput="window.filterProducts()" autocomplete="off">
            <button id="search-clear" onclick="window.clearSearch()" title="Clear">&#10005;</button>
        </div>

        <div class="account">
            <button class="switch-store-btn" onclick="window.openStorePicker()" title="Switch Store">Switch Store</button>
            <div class="cart-trigger" onclick="toggleCart()">
                Cart <span id="cart-count" class="empty">0</span>
            </div>
            <button class="orders-btn" id="orders-btn" onclick="window.openOrdersPopup()" title="My Orders">
                <span class="orders-btn-label">Orders</span>
            </button>
            <button class="logout-button" type="button" onclick="window.checkLogout()">Logout</button>
        </div>
    </nav>

    <!-- Cart Sidebar -->
    <div id="cart-popup" class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button onclick="toggleCart()" class="close-btn">Close</button>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <p>Total: <span id="cart-total">&#8358;0</span></p>
            <button class="btn-clear" onclick="clearCart()">Clear Cart</button>
            <button class="btn-pay" onclick="proceedToPayment()">Proceed to Payment</button>
        </div>
    </div>

    <!-- Category Filter -->
    <div id="shop-controls">
        <button id="filter-toggle-btn" class="filter-toggle-btn" onclick="window.toggleFilterBar('category-bar','filter-toggle-btn')">
            Filter
        </button>
        <div id="category-bar" class="filter-bar">
            <button class="cat-btn active" data-cat="All" onclick="window.selectCategory(this)">All</button>
        </div>
    </div>

    <!-- Product Grid -->
    <div id="product-container-customer" class="product-grid">
        <div id="no-results">No products match your search.</div>
    </div>

    <!-- Scripts -->
    <script src="notifications.js"></script>
    <script src="cardstorage.js" type="module"></script>
    <script src="cart.js" type="module"></script>
    <!-- Store Picker Modal (shown on first login and via Switch Store button) -->
    <div class="cust-store-overlay" id="cust-store-picker" style="display:none;">
        <div class="cust-store-box">
            <div class="cust-sp-header">
                <img src="images/CGrocs.png" alt="CGrocs">
                <h1 id="cust-sp-title">Choose Your Store</h1>
                <p id="cust-sp-sub">Select a store to start shopping</p>
            </div>
            <div class="cust-sp-body">
                <span class="cust-sp-label">Select your store</span>
                <div class="cust-store-cards" id="cust-store-cards-container">
                    <p style="color:#6b7280;font-size:13px;text-align:center;grid-column:1/-1;">Loading stores…</p>
                </div>
            </div>
        </div>
    </div>

    <style>
        /* Switch Store button in nav */
        .switch-store-btn {
            padding: 6px 14px; border-radius: 20px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.20);
            color: rgba(255,255,255,0.85);
            font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .switch-store-btn:hover { background: rgba(255,255,255,0.22); color: white; }

        /* Store Picker Modal */
        .cust-store-overlay {
            position: fixed; inset: 0;
            background: rgba(10,10,10,0.82);
            backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 99999; padding: 20px;
        }
        .cust-store-box {
            background: white; border-radius: 20px;
            max-width: 520px; width: 100%;
            box-shadow: 0 24px 80px rgba(0,0,0,0.35);
            overflow: hidden;
            animation: cspPopIn .35s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes cspPopIn {
            from { opacity: 0; transform: scale(.88) translateY(24px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .cust-sp-header {
            background: #0a0a0a; color: white;
            padding: 32px 32px 28px; text-align: center;
        }
        .cust-sp-header img { width: 52px; margin: 0 auto 14px; display: block; }
        .cust-sp-header h1  { font-size: 22px; font-weight: 800; margin: 0 0 6px; }
        .cust-sp-header p   { font-size: 14px; color: rgba(255,255,255,.6); margin: 0; }
        .cust-sp-body { padding: 28px 28px 32px; }
        .cust-sp-label {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .07em; color: #6b7280;
            margin-bottom: 14px; text-align: center; display: block;
        }
        .cust-store-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .cust-store-card {
            border: 2px solid #e4e4e7; border-radius: 14px;
            padding: 22px 16px; text-align: center;
            cursor: pointer; transition: all .2s;
            background: white; font-family: inherit; width: 100%;
        }
        .cust-store-card:hover, .cust-store-card:focus {
            border-color: #0a0a0a;
            box-shadow: 0 4px 18px rgba(0,0,0,.12);
            transform: translateY(-2px); outline: none;
        }
        .cust-store-card.active-store {
            border-color: #0a0a0a;
            background: #f4f4f5;
        }
        .cust-store-card .store-name { font-size: 16px; font-weight: 800; color: #1a1a1a; margin-bottom: 4px; }
        .cust-store-card .store-desc { font-size: 12px; color: #6b7280; line-height: 1.4; }
        @media (max-width: 420px) {
            .cust-sp-header { padding: 24px 20px 20px; }
            .cust-sp-body   { padding: 20px 16px 24px; }
            .cust-store-cards { grid-template-columns: 1fr; }
        }
    </style>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";
        import { headAdminConfig, STORE_IDS, STORE_LABELS } from "./firebase-config.js";

        let _custStoreLabels = {};

        async function loadCustStoreCards() {
            let stores = STORE_IDS.map(id => ({ id, label: STORE_LABELS[id] || id }));
            try {
                const haApp = getApps().find(a => a.name === 'home-ha') || initializeApp(headAdminConfig, 'home-ha');
                const haDb  = getFirestore(haApp);
                const snap  = await getDoc(doc(haDb, 'storeConfig', 'list'));
                if (snap.exists() && Array.isArray(snap.data().stores) && snap.data().stores.length > 0) {
                    stores = snap.data().stores;
                }
            } catch(e) { /* fallback is fine */ }

            _custStoreLabels = Object.fromEntries(stores.map(s => [s.id, s.label]));
            window._custStoreLabels = _custStoreLabels;

            const container = document.getElementById('cust-store-cards-container');
            if (!container) return;
            const current = sessionStorage.getItem('selectedStore');
            container.innerHTML = stores.map(s => `
                <button class="cust-store-card${s.id === current ? ' active-store' : ''}" onclick="window.custPickStore('${s.id}')">
                    <div class="store-name">${s.label}</div>
                </button>`).join('');
        }

        window.openStorePicker = async function(isInitial = false) {
            const overlay = document.getElementById('cust-store-picker');
            const titleEl = document.getElementById('cust-sp-title');
            const subEl   = document.getElementById('cust-sp-sub');
            if (titleEl) titleEl.textContent = isInitial ? 'Choose Your Store' : 'Switch Store';
            if (subEl)   subEl.textContent   = isInitial ? 'Select a store to start shopping' : 'Switch to a different store';
            await loadCustStoreCards();
            if (overlay) overlay.style.display = 'flex';
        };

        window.custPickStore = function(storeId) {
            sessionStorage.setItem('selectedStore', storeId);
            if (window._custStoreLabels && window._custStoreLabels[storeId]) {
                sessionStorage.setItem('storeLabel_' + storeId, window._custStoreLabels[storeId]);
            }
            // Update the store label in the nav
            const label = (window._custStoreLabels && window._custStoreLabels[storeId]) || storeId;
            const navLabel = document.getElementById('customer-store-label');
            if (navLabel) navLabel.textContent = label;
            // Close modal
            const overlay = document.getElementById('cust-store-picker');
            if (overlay) overlay.style.display = 'none';
            // Reload products for the new store
            if (typeof window.reloadStoreProducts === 'function') window.reloadStoreProducts();
        };

        // Close picker by clicking backdrop (only if a store is already chosen)
        document.getElementById('cust-store-picker').addEventListener('click', function(e) {
            if (e.target === this && sessionStorage.getItem('selectedStore')) {
                this.style.display = 'none';
            }
        });

        // Update nav label from sessionStorage on load
        document.addEventListener('DOMContentLoaded', async function() {
            const storeId = sessionStorage.getItem('selectedStore') || 'store1';
            const cached  = sessionStorage.getItem('storeLabel_' + storeId);
            const navLabel = document.getElementById('customer-store-label');
            if (navLabel) navLabel.textContent = cached || storeId;
        });
    </script>
</body>
</html>

    <!-- My Orders Panel -->
    <div id="orders-overlay" class="orders-overlay" onclick="window.closeOrdersPopup()"></div>
    <div id="orders-panel" class="orders-panel">

        <div class="orders-panel-header">
            <div>
                <h2 class="orders-panel-title">My Orders</h2>
                <p id="orders-subtitle" class="orders-panel-sub">Loading...</p>
            </div>
            <button onclick="window.closeOrdersPopup()" class="orders-panel-close">&#215;</button>
        </div>

        <!-- Filter row -->
        <div class="orders-filter-row">
            <button class="ord-filt active" data-f="all"      onclick="window._ordFilter(this)">All</button>
            <button class="ord-filt"        data-f="pending"  onclick="window._ordFilter(this)">Pending</button>
            <button class="ord-filt"        data-f="verified" onclick="window._ordFilter(this)">Collected</button>
        </div>

        <div id="orders-list" class="orders-list-body"></div>
    </div>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";
        import { customerConfig, storeCol } from "./firebase-config.js";

        const existing = getApps().find(a => a.name === 'cardstorage');
        const app = existing || initializeApp(customerConfig, 'cardstorage');
        const auth = getAuth(app);
        const db  = getFirestore(app);

        /* Logout handler — called by the nav logout button */
        window.checkLogout = function() {
            sessionStorage.setItem('intentional_logout', 'true');
            signOut(auth).then(() => {
                sessionStorage.clear();
                window.location.href = 'home.html';
            }).catch(e => {
                console.error('Logout error:', e);
                sessionStorage.removeItem('intentional_logout');
                notify.error('Logout failed. Please try again.');
            });
        };

        /* Security fix: scope query to current user instead of reading all purchases */
        let _allOrders    = [];
        let _ordersFilter = 'all';
        let _ordersUnsub  = null;

        /* Escape HTML to prevent XSS in dynamically rendered content */
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        window.openOrdersPopup = function() {
            document.getElementById('orders-overlay').style.display = 'block';
            document.getElementById('orders-panel').classList.add('open');
            if (!_ordersUnsub) window._loadOrders();
        };

        window.closeOrdersPopup = function() {
            document.getElementById('orders-overlay').style.display = 'none';
            document.getElementById('orders-panel').classList.remove('open');
        };

        window._loadOrders = function() {
            const listEl = document.getElementById('orders-list');
            const uid = window.currentUser && window.currentUser.uid;
            if (!uid) {
                if (listEl) listEl.innerHTML = '<p class="orders-empty-msg">Not logged in.</p>';
                return;
            }
            if (listEl) listEl.innerHTML = '<p style="text-align:center;padding:30px;color:#aaa;">Loading...</p>';

            /* Bug fix: use store-aware path stores/{storeId}/purchases, scoped to current user */
            const storeId = sessionStorage.getItem('selectedStore') || 'store1';
            _ordersUnsub = onSnapshot(
                query(collection(db, storeCol(storeId, 'purchases')), where('uid', '==', uid)),
                (snap) => {
                    _allOrders = [];
                    snap.forEach(d => _allOrders.push({ ...d.data(), _docId: d.id }));
                    _allOrders.sort((a, b) => new Date(b.date) - new Date(a.date));
                    _renderOrders();
                },
                (e) => {
                    console.error('Orders load error:', e);
                    const el = document.getElementById('orders-list');
                    if (el) el.innerHTML = '<p class="orders-empty-msg">Could not load orders.</p>';
                }
            );
        };

        window._ordFilter = function(btn) {
            document.querySelectorAll('.ord-filt').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            _ordersFilter = btn.dataset.f;
            _renderOrders();
        };

        function _renderOrders() {
            const listEl     = document.getElementById('orders-list');
            const subtitleEl = document.getElementById('orders-subtitle');
            if (!listEl) return;

            const filtered = _ordersFilter === 'verified' ? _allOrders.filter(p => p.verified)
                : _ordersFilter === 'pending'  ? _allOrders.filter(p => !p.verified)
                : _allOrders;

            if (subtitleEl) {
                subtitleEl.textContent = _allOrders.length === 0
                    ? 'No orders yet'
                    : `${_allOrders.length} order${_allOrders.length !== 1 ? 's' : ''} total`;
            }

            if (filtered.length === 0) {
                listEl.innerHTML = `<div class="orders-empty-msg" style="padding:40px 20px;">
                    <p style="font-size:14px;">No orders here.</p>
                </div>`;
                return;
            }

            listEl.innerHTML = filtered.map(p => {
                const items   = p.items ? p.items.map(i => `${i.quantity}\u00d7 ${escapeHtml(i.name)}`).join(', ') : '\u2014';
                const dateStr = p.date ? new Date(p.date).toLocaleDateString('en-NG', { day:'numeric', month:'short', year:'numeric' }) : '\u2014';
                const total   = p.total ? p.total.toLocaleString('en-NG', { minimumFractionDigits: 2 }) : '0.00';

                let badgeHtml;
                if (p.verified) {
                    badgeHtml = `<span class="ord-badge ord-badge-verified">Collected</span>`;
                } else if (p.orderStatus === 'ready') {
                    const lbl = p.fulfillmentMethod === 'delivery' ? 'Out for Delivery' : 'Ready for Pickup';
                    badgeHtml = `<span class="ord-badge ord-badge-ready">${lbl}</span>`;
                } else {
                    badgeHtml = `<span class="ord-badge ord-badge-pending">Pending</span>`;
                }

                const qrBtn = (!p.verified && p.id)
                    ? `<button class="ord-qr-btn" onclick="window._ordShowQR('${escapeHtml(p.id)}', '${escapeHtml(items).replace(/'/g,"\\'")}', ${p.total || 0})">Show QR</button>`
                    : '';

                return `
                <div class="ord-card">
                    <div class="ord-id">${escapeHtml(p.id) || '\u2014'}</div>
                    <div class="ord-items">${items}</div>
                    <div class="ord-date">${dateStr}</div>
                    <div class="ord-footer">
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                            <span class="ord-amount">&#8358;${total}</span>
                            ${badgeHtml}
                        </div>
                        ${qrBtn}
                    </div>
                </div>`;
            }).join('');
        }

        window._ordShowQR = function(purchaseId, itemsText, total) {
            const existing = document.getElementById('ord-qr-modal');
            if (existing) existing.remove();

            const modal = document.createElement('div');
            modal.id = 'ord-qr-modal';
            modal.className = 'ord-qr-modal-overlay';
            modal.innerHTML = `
                <div class="ord-qr-modal-box">
                    <div class="ord-qr-modal-header">
                        <h2 class="ord-qr-modal-title">Show to Cashier</h2>
                        <button onclick="document.getElementById('ord-qr-modal').remove()" class="ord-qr-modal-close">&#215;</button>
                    </div>
                    <div class="ord-qr-modal-body">
                        <p class="ord-qr-label">Purchase ID</p>
                        <p class="ord-qr-id">${escapeHtml(purchaseId)}</p>
                        <p class="ord-qr-items">${escapeHtml(itemsText)}</p>
                        <p class="ord-qr-total">&#8358;${Number(total).toLocaleString('en-NG',{minimumFractionDigits:2})}</p>
                        <div id="ord-qrcode" class="ord-qrcode-wrap"></div>
                        <p class="ord-qr-hint">Scan or read the ID above to verify your purchase</p>
                        <button onclick="document.getElementById('ord-qr-modal').remove()" class="btn-done">Done</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

            setTimeout(() => {
                if (typeof QRCode !== 'undefined') {
                    new QRCode(document.getElementById('ord-qrcode'), {
                        text: purchaseId, width: 180, height: 180,
                        colorDark: '#000000', colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
            }, 50);
        };
    </script>
</body>
</html>
