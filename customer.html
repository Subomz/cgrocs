<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColEx - Shop</title>
    <link rel="icon" type="image/x-icon" href="images/CloEx.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="customer.css">

    <!-- Paystack -->
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script>
      /* Keep --nav-h in sync so the cart sidebar always starts below the navbar */
      function setNavH() {
        const nav = document.querySelector('nav');
        if (nav) document.documentElement.style.setProperty('--nav-h', nav.offsetHeight + 'px');
      }
      window.addEventListener('load',   setNavH);
      window.addEventListener('resize', setNavH);
      document.addEventListener('DOMContentLoaded', setNavH);
    </script>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- AUTHENTICATION GUARD — must load first -->
    <script src="customer-auth-guard.js" type="module"></script>
</head>
<body style="visibility: hidden;">

    <nav class="customer-nav">
        <div class="navlogo">
            <img src="images/CloEx.png" alt="ColEx" width="40px">
        </div>

        <div id="nav-search-wrap">
            <span id="nav-search-icon">&#9906;</span>
            <input type="text" id="product-search" placeholder="Search products..." oninput="window.filterProducts()" autocomplete="off">
            <button id="search-clear" onclick="window.clearSearch()" title="Clear">&#10005;</button>
        </div>

        <div class="account">
            <div class="cart-trigger" onclick="toggleCart()">
                Cart <span id="cart-count" class="empty">0</span>
            </div>
            <button class="orders-btn" id="orders-btn" onclick="window.openOrdersPopup()" title="My Orders">
                <span class="orders-btn-label">Orders</span>
            </button>
            <button class="logout-button" type="button" onclick="window.checkLogout()">Logout</button>
        </div>
    </nav>

    <!-- Cart Sidebar -->
    <div id="cart-popup" class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button onclick="toggleCart()" class="close-btn">Close</button>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <p>Total: <span id="cart-total">&#8358;0</span></p>
            <button class="btn-clear" onclick="clearCart()">Clear Cart</button>
            <button class="btn-pay" onclick="proceedToPayment()">Proceed to Payment</button>
        </div>
    </div>

    <!-- Category Filter -->
    <div id="shop-controls">
        <button id="filter-toggle-btn" class="filter-toggle-btn" onclick="window.toggleFilterBar('category-bar','filter-toggle-btn')">
            Filter
        </button>
        <div id="category-bar" class="filter-bar">
            <button class="cat-btn active" data-cat="All" onclick="window.selectCategory(this)">All</button>
        </div>
    </div>

    <!-- Product Grid -->
    <div id="product-container-customer" class="product-grid">
        <div id="no-results">No products match your search.</div>
    </div>

    <!-- Scripts -->
    <script src="notifications.js"></script>
    <script src="cardstorage.js" type="module"></script>
    <script src="cart.js" type="module"></script>

    <!-- My Orders Panel -->
    <div id="orders-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:99990;" onclick="window.closeOrdersPopup()"></div>
    <div id="orders-panel" style="
        position:fixed;top:0;right:0;height:100%;width:100%;max-width:420px;
        background:white;z-index:99991;box-shadow:-4px 0 24px rgba(0,0,0,0.15);
        display:flex;flex-direction:column;transform:translateX(100%);
        transition:transform 0.3s ease;overflow:hidden;">

        <div style="background:#0a0a0a;color:white;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
            <div>
                <h2 style="margin:0;font-size:18px;font-weight:700;">My Orders</h2>
                <p id="orders-subtitle" style="margin:2px 0 0;font-size:12px;color:rgba(255,255,255,0.6);">Loading...</p>
            </div>
            <button onclick="window.closeOrdersPopup()" style="background:rgba(255,255,255,0.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;">&#215;</button>
        </div>

        <!-- Filter row -->
        <div style="display:flex;gap:6px;padding:12px 16px;border-bottom:1px solid #f0f0f0;flex-shrink:0;flex-wrap:wrap;">
            <button class="ord-filt active" data-f="all"      onclick="window._ordFilter(this)">All</button>
            <button class="ord-filt"        data-f="pending"  onclick="window._ordFilter(this)">Pending</button>
            <button class="ord-filt"        data-f="verified" onclick="window._ordFilter(this)">Collected</button>
        </div>

        <div id="orders-list" style="flex:1;overflow-y:auto;padding:12px 16px;"></div>
    </div>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";
        import { customerConfig } from "./firebase-config.js";

        const existing = getApps().find(a => a.name === 'cardstorage');
        const app = existing || initializeApp(customerConfig, 'cardstorage');
        const db  = getFirestore(app);

        /* Security fix: scope query to current user instead of reading all purchases */
        let _allOrders    = [];
        let _ordersFilter = 'all';
        let _ordersUnsub  = null;

        /* Escape HTML to prevent XSS in dynamically rendered content */
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        window.openOrdersPopup = function() {
            document.getElementById('orders-overlay').style.display = 'block';
            document.getElementById('orders-panel').style.transform = 'translateX(0)';
            if (!_ordersUnsub) window._loadOrders();
        };

        window.closeOrdersPopup = function() {
            document.getElementById('orders-overlay').style.display = 'none';
            document.getElementById('orders-panel').style.transform = 'translateX(100%)';
        };

        window._loadOrders = function() {
            const listEl = document.getElementById('orders-list');
            const uid = window.currentUser && window.currentUser.uid;
            if (!uid) {
                if (listEl) listEl.innerHTML = '<p style="text-align:center;padding:30px;color:#aaa;">Not logged in.</p>';
                return;
            }
            if (listEl) listEl.innerHTML = '<p style="text-align:center;padding:30px;color:#aaa;">Loading...</p>';

            /* Bug fix: query scoped to the current user — previously read all purchases */
            _ordersUnsub = onSnapshot(
                query(collection(db, 'purchases'), where('uid', '==', uid)),
                (snap) => {
                    _allOrders = [];
                    snap.forEach(d => _allOrders.push({ ...d.data(), _docId: d.id }));
                    _allOrders.sort((a, b) => new Date(b.date) - new Date(a.date));
                    _renderOrders();
                },
                (e) => {
                    console.error('Orders load error:', e);
                    const el = document.getElementById('orders-list');
                    if (el) el.innerHTML = '<p style="text-align:center;padding:30px;color:#aaa;">Could not load orders.</p>';
                }
            );
        };

        window._ordFilter = function(btn) {
            document.querySelectorAll('.ord-filt').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            _ordersFilter = btn.dataset.f;
            _renderOrders();
        };

        function _renderOrders() {
            const listEl     = document.getElementById('orders-list');
            const subtitleEl = document.getElementById('orders-subtitle');
            if (!listEl) return;

            const filtered = _ordersFilter === 'verified' ? _allOrders.filter(p => p.verified)
                : _ordersFilter === 'pending'  ? _allOrders.filter(p => !p.verified)
                : _allOrders;

            if (subtitleEl) {
                subtitleEl.textContent = _allOrders.length === 0
                    ? 'No orders yet'
                    : `${_allOrders.length} order${_allOrders.length !== 1 ? 's' : ''} total`;
            }

            if (filtered.length === 0) {
                listEl.innerHTML = `<div style="text-align:center;padding:40px 20px;color:#aaa;">
                    <p style="font-size:14px;">No orders here.</p>
                </div>`;
                return;
            }

            listEl.innerHTML = filtered.map(p => {
                const items   = p.items ? p.items.map(i => `${i.quantity}\u00d7 ${escapeHtml(i.name)}`).join(', ') : '\u2014';
                const dateStr = p.date ? new Date(p.date).toLocaleDateString('en-NG', { day:'numeric', month:'short', year:'numeric' }) : '\u2014';
                const total   = p.total ? p.total.toLocaleString('en-NG', { minimumFractionDigits: 2 }) : '0.00';

                let badgeHtml;
                if (p.verified) {
                    badgeHtml = `<span class="ord-badge ord-badge-verified">Collected</span>`;
                } else if (p.orderStatus === 'ready') {
                    const lbl = p.fulfillmentMethod === 'delivery' ? 'Out for Delivery' : 'Ready for Pickup';
                    badgeHtml = `<span class="ord-badge ord-badge-ready">${lbl}</span>`;
                } else {
                    badgeHtml = `<span class="ord-badge ord-badge-pending">Pending</span>`;
                }

                const qrBtn = (!p.verified && p.id)
                    ? `<button class="ord-qr-btn" onclick="window._ordShowQR('${escapeHtml(p.id)}', '${escapeHtml(items).replace(/'/g,"\\'")}', ${p.total || 0})">Show QR</button>`
                    : '';

                return `
                <div class="ord-card">
                    <div class="ord-id">${escapeHtml(p.id) || '\u2014'}</div>
                    <div class="ord-items">${items}</div>
                    <div class="ord-date">${dateStr}</div>
                    <div class="ord-footer">
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                            <span class="ord-amount">&#8358;${total}</span>
                            ${badgeHtml}
                        </div>
                        ${qrBtn}
                    </div>
                </div>`;
            }).join('');
        }

        window._ordShowQR = function(purchaseId, itemsText, total) {
            const existing = document.getElementById('ord-qr-modal');
            if (existing) existing.remove();

            const modal = document.createElement('div');
            modal.id = 'ord-qr-modal';
            modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:999999;padding:16px;';
            modal.innerHTML = `
                <div style="background:white;border-radius:16px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);font-family:inherit;overflow:hidden;">
                    <div style="background:#0a0a0a;color:white;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;">
                        <h2 style="margin:0;font-size:17px;font-weight:700;">Show to Cashier</h2>
                        <button onclick="document.getElementById('ord-qr-modal').remove()" style="background:rgba(255,255,255,0.15);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;">&#215;</button>
                    </div>
                    <div style="padding:22px;text-align:center;">
                        <p style="font-size:12px;color:#aaa;margin-bottom:4px;">Purchase ID</p>
                        <p style="font-family:'DM Mono','Courier New',monospace;font-size:13px;font-weight:700;color:#111;background:#f5f5f5;padding:10px;border-radius:8px;word-break:break-all;margin-bottom:14px;">${escapeHtml(purchaseId)}</p>
                        <p style="font-size:13px;color:#555;margin-bottom:6px;">${escapeHtml(itemsText)}</p>
                        <p style="font-size:15px;font-weight:700;color:#111;margin-bottom:18px;">&#8358;${Number(total).toLocaleString('en-NG',{minimumFractionDigits:2})}</p>
                        <div id="ord-qrcode" style="display:inline-block;margin-bottom:10px;"></div>
                        <p style="font-size:11px;color:#aaa;">Scan or read the ID above to verify your purchase</p>
                        <button onclick="document.getElementById('ord-qr-modal').remove()" style="margin-top:16px;width:100%;padding:12px;background:#0a0a0a;color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">Done</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

            setTimeout(() => {
                if (typeof QRCode !== 'undefined') {
                    new QRCode(document.getElementById('ord-qrcode'), {
                        text: purchaseId, width: 180, height: 180,
                        colorDark: '#000000', colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
            }, 50);
        };
    </script>
</body>
</html>
