<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGrocs - Login</title>
    <link rel="icon" type="image/x-icon" href="images/CGrocs.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <!-- Vercel Analytics -->
    <script>
     window.va = window.va || function () {
        (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <!-- Vercel Speed Insights -->
    <script>
     window.si = window.si || function () {
        (window.siq = window.siq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-logo">
            <img src="images/CGrocs.png" alt="CGrocs Logo">
        </div>
        <h1 class="page-title">Welcome Back</h1>
        <p class="page-subtitle">Login to your CGrocs account</p>

        <div class="form-field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="jane@email.com"
                   autocomplete="email" required>
        </div>

        <div class="form-field">
            <div class="password-label-row">
                <label for="password">Password</label>
                <button type="button" class="forgot-link" onclick="window.openResetModal()">
                    Forgot password?
                </button>
            </div>
            <div class="password-input-wrap">
                <input type="password" id="password" placeholder="Your password"
                       autocomplete="current-password" required>
                <button type="button" class="show-password-btn" id="toggle-password"
                        onclick="togglePasswordVisibility()" aria-label="Show password">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                      <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
        </div>

        <button id="submit" type="button">Login</button>

        <hr class="divider">

        <p class="login-link">Don't have an account? <a href="register.html">Create Account</a></p>
    </div>

    <script src="notifications.js"></script>
    <script type="module" src="login.js"></script>
    <script>
        function togglePasswordVisibility() {
            const input   = document.getElementById('password');
            const btn     = document.getElementById('toggle-password');
            const show    = input.type === 'password';
            input.type    = show ? 'text' : 'password';
            btn.innerHTML = show ? `
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>` : `
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>`;
            btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        }
    </script>
</body>
</html>
