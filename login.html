<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColEx - Login</title>
    <link rel="icon" type="image/x-icon" href="images/CloEx.png">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-logo">
            <img src="images/CloEx.png" alt="ColEx Logo">
        </div>
        <h1 class="page-title">Welcome Back</h1>
        <p class="page-subtitle">Login to your ColEx account</p>

        <!-- Bug fix #36: autocomplete attributes added so password managers work correctly -->
        <div class="form-field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="jane@email.com"
                   autocomplete="email" required>
        </div>

        <div class="form-field">
            <!-- Password label row: label left, forgot-password link right -->
            <div class="password-label-row">
                <label for="password">Password</label>
                <button type="button" class="forgot-link" onclick="window.openResetModal()">
                    Forgot password?
                </button>
            </div>
            <input type="password" id="password" placeholder="Your password"
                   autocomplete="current-password" required>
        </div>

        <button id="submit" type="button">Login</button>

        <hr class="divider">

        <p class="login-link">Don't have an account? <a href="register.html">Create Account</a></p>
    </div>

    <script src="notifications.js"></script>
    <script type="module" src="login.js"></script>
</body>
</html>
