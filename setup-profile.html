<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloEx - Complete Your Profile</title>
    <link rel="icon" type="image/x-icon" href="images/CloEx.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
    <!-- Vercel Analytics -->
    <script>
     window.va = window.va || function () {
        (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <!-- Vercel Speed Insights -->
    <script>
     window.si = window.si || function () {
        (window.siq = window.siq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body style="visibility:hidden;">

    <div class="register-wrapper">
        <div class="register-logo">
            <img src="images/CloEx.png" alt="CloEx Logo">
        </div>
        <h1 class="page-title">Complete Your Profile</h1>
        <p class="page-subtitle">Add your details so we can serve you better</p>

        <div class="setup-banner">
            <div>
                <strong>Your account needs a profile</strong>
                Fill in the fields below to complete your account setup.
            </div>
        </div>

        <p class="section-label">Personal Info</p>
        <div class="field-group">
            <div class="form-field">
                <label for="first-name">First Name <span style="color:#dc2626;">*</span></label>
                <input type="text" id="first-name" placeholder="Jane" required>
            </div>
            <div class="form-field">
                <label for="last-name">Last Name <span style="color:#dc2626;">*</span></label>
                <input type="text" id="last-name" placeholder="Doe" required>
            </div>
        </div>
        <div class="form-field">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="+234 800 000 0000">
        </div>

        <p class="section-label">Account</p>
        <div class="form-field">
            <label for="email-display">Email Address <span style="font-size:11px;color:#6b7280;font-weight:400;">(cannot be changed)</span></label>
            <input type="email" id="email-display" disabled>
        </div>

        <button id="submit" type="button">Save &amp; Continue</button>
        <span class="skip-link" onclick="window.location.href='customer.html'">Skip for now</span>
    </div>

    <script src="notifications.js"></script>
    <script type="module" src="setup-profile.js"></script>
</body>
</html>
