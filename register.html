<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGrocs - Create Account</title>
    <link rel="icon" type="image/x-icon" href="images/CGrocs.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="register-wrapper">
        <div class="register-logo">
            <img src="images/CGrocs.png" alt="CGrocs Logo">
        </div>
        <h1 class="page-title">Create Account</h1>
        <p class="page-subtitle">Join CGrocs — it only takes a minute</p>

        <p class="section-label">Personal Info</p>
        <div class="field-group">
            <div class="form-field">
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" placeholder="Jane" required>
            </div>
            <div class="form-field">
                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" placeholder="Doe" required>
            </div>
        </div>
        <div class="form-field">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="+234 800 000 0000">
        </div>

        <p class="section-label">Account Details</p>
        <div class="form-field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="jane@email.com" autocomplete="email" required>
        </div>
        <div class="form-field">
            <label for="password">Password</label>
            <div class="password-input-wrap">
                <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password" required>
                <button type="button" class="show-password-btn" id="show-password-btn-reg" onclick="togglePassword_password()" aria-label="Show password"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
            </div>
        </div>

        <button id="submit" type="button">Create Account</button>

        <hr class="divider">
        <p class="login-link">Already have an account? <a href="login.html">Login Here</a></p>
    </div>

    <script src="notifications.js"></script>
    <script type="module" src="register.js"></script>

    <script>
        function togglePassword_password() {
            var input = document.getElementById('password');
            var btn   = document.getElementById('show-password-btn-reg');
            var show  = input.type === 'password';
            input.type    = show ? 'text' : 'password';
            btn.innerHTML = show ? `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>` : `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
            btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        }
    </script>
</body>
</html>
